<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>

  <style>
    body {
     .hero {
 background: url("https://images.unsplash.com/photo-1535223289827-42f1e9919769") center/cover;
  padding: 60px 20px;
}

.hero-box {
  max-width: 700px;
  margin: auto;
  background: rgba(30, 41, 59, 0.7);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.subtitle {
  color: #ccc;
  margin-top: 10px;
}

.note {
  color: orange;
  margin-top: 10px;
  font-size: 14px;
}
    h1 {
      .hero h1 {
  text-shadow: 0 0 20px gold;
}

    #timer {
      margin-top: 10px;
      font-size: 18px;
      color: gold;
    }

    .card {
      background: #1e293b;
      margin: 15px auto;
      padding: 20px;
      border-radius: 20px;
      width: 300px;
      transition: 0.3s;
    }

    .rank1 {
      border: 2px solid gold;
      box-shadow: 0 0 20px gold;
    }

    img:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 10px gold);
      transition: 0.3s;
    }
  </style>
</head>

<body>

<div class="hero">

  <div class="hero-box">
    <h1>🏆 Leaderboard Race</h1>

    <p class="subtitle">
      The leaderboard updates every 45 minutes.
    </p>

    <p class="note">
      Join using our code to compete & win rewards 💰
    </p>
  </div>

</div>
<div id="timer"></div>

<div style="margin-top: 20px; font-size: 18px; color: #ccc;">
  Join using our code on 
  <a href="https://rainbet.com/?r=unused" target="_blank"
     style="
       color: #00bfff;
       font-weight: bold;
       text-decoration: none;
       text-shadow: 0 0 10px #00bfff;
     ">
     RAINBET
  </a>
  to enter the leaderboard & win rewards 💰
</div>

<div id="leaderboard"></div>

<!-- 🔥 FLOATING ICONS -->
<div style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
">

  <!-- DISCORD -->
  <a href="https://discord.gg/apbny8RZSM" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"
         style="width: 50px;">
  </a>


<script>
async function loadLeaderboard() {
  const res = await fetch("https://opensheet.elk.sh/1yQH9Y3qjfnMOok5V676z0xvLQjDmQ0RWwCbjEdAAsfo/Sheet1");
  const data = await res.json();

  data.sort((a, b) => b.Wagered - a.Wagered);

  const container = document.getElementById("leaderboard");
  container.innerHTML = "";

  data.slice(0, 8).forEach((player, index) => {
    const div = document.createElement("div");
    div.className = "card " + (index === 0 ? "rank1" : "");

    div.innerHTML = `
      <h2>#${index + 1} ${player.Username}</h2>
      <p>Wagered: $${Number(player.Wagered).toLocaleString()}</p>
      <p>${player.Prize ? "Prize: $" + player.Prize : ""}</p>
    `;

    container.appendChild(div);
  });
}

function startTimer() {
  const endDate = new Date("2026-04-30T00:00:00Z");

  function updateTimer() {
    const now = new Date();
    const diff = endDate - now;

    if (diff <= 0) {
      document.getElementById("timer").innerHTML = "Event Ended";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
      `⏳ Ends in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateTimer();
  setInterval(updateTimer, 1000);
}

loadLeaderboard();
startTimer();
setInterval(loadLeaderboard, 15000);
</script>

</body>
</html>
