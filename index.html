<!DOCTYPE html>
<html>
<head>
<title>$300 Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#0a1f44,#020617);
  color:white;
  text-align:center;
}

/* HEADER */
h1 {
  font-size:42px;
  margin-top:30px;
}

.subtitle {
  color:#aaa;
}

.highlight {
  color:#00bfff;
  text-decoration:none;
  font-weight:600;
}

/* TIMER */
.timer {
  margin:20px;
  color:gold;
  font-size:18px;
}

/* TOP 3 */
.top3 {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.card {
  background:linear-gradient(145deg,#141a2b,#0c101a);
  padding:20px;
  border-radius:15px;
  width:170px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.rank1 {
  border:2px solid gold;
  box-shadow:0 0 25px gold;
}

/* LIST */
.list {
  max-width:600px;
  margin:30px auto;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* BUTTONS */
.btn {
  margin:10px;
  padding:12px 20px;
  border-radius:10px;
  background:#111;
  color:white;
  text-decoration:none;
  display:inline-block;
}

.btn:hover {
  box-shadow:0 0 15px #00bfff;
}

/* FOOTER */
.footer {
  margin-top:40px;
  color:#aaa;
}

.fire {
  color:orange;
  font-weight:bold;
}
</style>
</head>
<body>
<h1>$300 LEADERBOARD 💰</h1>
<p class="subtitle">Compete & climb the leaderboard</p>
<p>
Join on 
<a class="highlight" href="https://rainbet.com/?r=unused" target="_blank">RAINBET</a>
</p>
<div class="timer" id="timer"></div>
<div class="top3" id="top3"></div>
<div class="list" id="list"></div>
<!-- BUTTONS -->
<div>
  <a class="btn" href="https://rainbet.com/?r=unused" target="_blank">Sign Up</a>
  <a class="btn" href="https://discord.gg/92FJYmq33" target="_blank">My Discord</a>
  <a class="btn" href="https://discord.gg/Nzq7mzGtc" target="_blank">Owner Discord</a>
</div>
<!-- FOOTER -->
<div class="footer">
  <p>🔥 Made by <a class="fire" href="https://discord.gg/92FJYmq33" target="_blank">SAIF</a></p>
  <p>
    Please gamble responsibly. Gambling can be addictive and may result in difficulties.<br>
    Visit BeGambleAware.org for support.
  </p>
  <p>© 2026 All Rights Reserved</p>
</div>
<script>

/* LOAD DATA */
async function loadLeaderboard() {
  const res = await fetch("https://opensheet.elk.sh/1yQH9Y3qjfnMOok5V676z0xvLQjDmQ0RWwCbjEdAAsfo/Sheet1");
  const data = await res.json();

  // SAFE SORT (fix NaN issues)
  data.sort((a,b)=>
    Number(String(b.Wagered||0).replace(/,/g,"")) -
    Number(String(a.Wagered||0).replace(/,/g,""))
  );

  const top3 = document.getElementById("top3");
  const list = document.getElementById("list");

  top3.innerHTML="";
  list.innerHTML="";

  // TOP 3
  data.slice(0,3).forEach((p,i)=>{
    const wager = Number(String(p.Wagered||0).replace(/,/g,"")) || 0;

    top3.innerHTML += `
      <div class="card ${i==0?'rank1':''}">
        <h3>#${i+1} ${p.Username || "Unknown"}</h3>
        <p>$${wager.toLocaleString()}</p>
        <p>Prize: $${p.Prize || 0}</p>
      </div>
    `;
  });

  // REST
  data.slice(3).forEach((p,i)=>{
    const wager = Number(String(p.Wagered||0).replace(/,/g,"")) || 0;

    list.innerHTML += `
      <div class="row">
        <span>#${i+4} ${p.Username || "Unknown"}</span>
        <span>$${wager.toLocaleString()}</span>
      </div>
    `;
  });
}

/* TIMER */
function startTimer(){
  const end = new Date("2026-04-30T00:00:00Z");

  function update(){
    const now = new Date();
    const diff = end - now;

    const d = Math.floor(diff/1000/60/60/24);
    const h = Math.floor(diff/1000/60/60%24);
    const m = Math.floor(diff/1000/60%60);
    const s = Math.floor(diff/1000%60);

    document.getElementById("timer").innerHTML =
      `⏳ LEADERBOARD ENDED;
  }

  update();
  setInterval(update,1000);
}

/* RUN */
loadLeaderboard();
startTimer();
setInterval(loadLeaderboard,15000);

</script>
</body>
</html>
