<!DOCTYPE html>
<html>
<head>
  <title>$300 Leaderboard</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      margin: 0;
      text-align: center;
    }

    .main {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    /* HERO */
    .hero {
      padding: 60px 20px;
    }

    .hero-box {
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .hero h1 {
      font-size: 34px;
      text-shadow: 0 0 20px gold;
    }

    .prize {
      font-size: 28px;
      color: gold;
      margin-top: 10px;
      text-shadow: 0 0 10px gold;
    }

    .subtitle {
      color: #ccc;
      margin-top: 10px;
    }

    .note {
      margin-top: 15px;
      font-size: 16px;
    }

    .note a {
      color: #00bfff;
      font-weight: bold;
      text-decoration: none;
      text-shadow: 0 0 10px #00bfff;
    }

    .note a:hover {
      text-shadow: 0 0 20px #00bfff;
    }

    /* TIMER */
    #timer {
      margin-top: 20px;
      font-size: 18px;
      color: gold;
    }

    /* CARDS */
    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      border-radius: 20px;
      width: 300px;
      transition: 0.3s;
    }

    .rank1 {
      border: 2px solid gold;
      box-shadow: 0 0 25px gold;
    }

    /* FLOATING DISCORD */
    .floating {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }

    .floating img {
      width: 50px;
      cursor: pointer;
    }

    .floating img:hover {
      transform: scale(1.1);
      transition: 0.3s;
    }

  </style>
</head>

<body>

<div class="main">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-box">
      <h1>🏆 Leaderboard Race</h1>

      <div class="prize">$300 PRIZE POOL 💰</div>

      <p class="subtitle">
        Compete with others and climb the leaderboard.
      </p>

      <p class="note">
        Join using our code on 
        <a href="https://rainbet.com/?r=unused" target="_blank">
          RAINBET
        </a>
        to enter & win rewards 🚀
      </p>
    </div>
  </div>

  <!-- TIMER -->
  <div id="timer"></div>

  <!-- LEADERBOARD -->
  <div id="leaderboard"></div>

</div>

<!-- DISCORD -->
<div class="floating">
  <a href="https://discord.gg/apbny8RZSM" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
  </a>
</div>

<script>
async function loadLeaderboard() {
  const res = await fetch("https://opensheet.elk.sh/1yQH9Y3qjfnMOok5V676z0xvLQjDmQ0RWwCbjEdAAsfo/Sheet1");
  const data = await res.json();

  data.sort((a, b) => b.Wagered - a.Wagered);

  const container = document.getElementById("leaderboard");
  container.innerHTML = "";

  data.slice(0, 8).forEach((player, index) => {
    const div = document.createElement("div");
    div.className = "card " + (index === 0 ? "rank1" : "");

    div.innerHTML = `
      <h2>#${index + 1} ${player.Username}</h2>
      <p>Wagered: $${Number(player.Wagered).toLocaleString()}</p>
      <p>${player.Prize ? "Prize: $" + player.Prize : ""}</p>
    `;

    container.appendChild(div);
  });
}

/* TIMER */
function startTimer() {
  const endDate = new Date("2026-04-30T00:00:00Z");

  function updateTimer() {
    const now = new Date();
    const diff = endDate - now;

    if (diff <= 0) {
      document.getElementById("timer").innerHTML = "Event Ended";
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerHTML =
      `⏳ Ends in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateTimer();
  setInterval(updateTimer, 1000);
}

loadLeaderboard();
startTimer();
setInterval(loadLeaderboard, 15000);
</script>

</body>
</html>
